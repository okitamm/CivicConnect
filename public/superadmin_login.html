<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivicConnect</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">

<!-- ════ FIREBASE SDKS ════ -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

<style>
  :root {
    --navy: #0F172A; 
    --navy-dk: #020617; 
    --ctext: #0F172A; 
    --cmuted: #64748B; 
    --cborder: #E2E8F0; 
    --accent-gold: #F59E0B; /* Superadmin Accent */
    --accent-gold-hover: #D97706;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--navy); 
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* ─── HIGH SECURITY BACKGROUND ─── */
  .bg-pattern {
    position: absolute; inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    z-index: 0;
  }

  .auth-wrapper {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    padding: 20px;
    animation: fadeSlideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .back-link {
    display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.6); text-decoration: none; margin-bottom: 24px; transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent-gold); }
  .back-link svg { width: 16px; height: 16px; }

  /* ─── AUTH CARD ─── */
  .auth-card {
    background: #ffffff;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    overflow: hidden;
  }

  .auth-header {
    background: var(--navy-dk);
    padding: 32px 32px 24px;
    text-align: center;
    position: relative;
    border-bottom: 4px solid var(--accent-gold); /* Thicker accent line */
  }
  
  .auth-logo { display: inline-flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px; position: relative; z-index: 2;}
  .auth-logo-mark {
    width: 32px; height: 32px; background: var(--accent-gold); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 800; color: var(--navy-dk);
  }
  .auth-logo-text { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }

  .auth-title { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 600; color: #fff; position: relative; z-index: 2;}
  .auth-subtitle { font-size: 12px; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-top: 6px; position: relative; z-index: 2;}

  .auth-body { padding: 32px; }

  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--ctext); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  
  .form-control {
    width: 100%; height: 46px; padding: 0 16px; font-family: 'Inter', sans-serif; font-size: 14px;
    color: var(--ctext); background: #F8FAFC; border: 1px solid var(--cborder); border-radius: 10px;
    transition: all 0.2s; outline: none;
  }
  .form-control:focus { border-color: var(--accent-gold); background: #fff; box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15); } /* Gold focus state */

  .btn-primary {
    width: 100%; height: 48px; background: var(--accent-gold); color: #fff; border: none; border-radius: 10px; /* Orange/Gold button */
    font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center; margin-top: 12px;
  }
  .btn-primary:hover { background: var(--accent-gold-hover); }

  .system-notice {
    margin-top: 24px; padding: 12px; background: #FEF2F2; border: 1px solid #FECDD3; border-radius: 8px;
    display: flex; gap: 10px; align-items: flex-start; font-size: 11px; color: #BE123C; line-height: 1.5;
  }
  .system-notice svg { flex-shrink: 0; margin-top: 2px; color: #E11D48; }

</style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="auth-wrapper">
  
  <a href="index.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Return to Public Portal
  </a>

  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <div class="auth-logo-mark">C</div>
        <div class="auth-logo-text">CivicConnect</div>
      </div>
      <h1 class="auth-title">System Owner Login</h1>
      <p class="auth-subtitle">Platform Superadmin</p>
    </div>

    <div class="auth-body">
      <!-- ════ FORM UPDATED WITH IDS ════ -->
      <form id="adminLoginForm">
        
        <div class="form-group">
          <label class="form-label">System ID (Email)</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="admin@civicconnect.gov.ph" required>
        </div>

        <div class="form-group">
          <label class="form-label">Master Password</label>
          <input type="password" id="loginPass" class="form-control" placeholder="••••••••••••" required>
        </div>

        <!-- Hidden 2FA for now, since Firebase doesn't need it natively -->
        <div class="form-group" style="display:none;">
          <label class="form-label">Security Key (2FA)</label>
          <input type="text" class="form-control" placeholder="6-digit authenticator code">
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">Authenticate</button>

      </form>

      <div class="system-notice">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <div id="errorMsg"><strong>UNAUTHORIZED ACCESS PROHIBITED.</strong> This portal provides full database access. All authentication attempts are logged.</div>
      </div>

    </div>
  </div>
</div>

<!-- ════ FIREBASE INITIALIZATION & LOGIC ════ -->
<script>
  // Your specific Firebase configuration
  const firebaseConfig = {
    apiKey: "",
    authDomain: "civicconnect-933d3.firebaseapp.com",
    projectId: "civicconnect-933d3",
    storageBucket: "civicconnect-933d3.firebasestorage.app",
    messagingSenderId: "326496710020",
    appId: "1:326496710020:web:73b89f27349376367801d1"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Handle Form Submission
  const loginForm = document.getElementById('adminLoginForm');
  const btn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault(); // Stop page from refreshing
    
    btn.textContent = "Authenticating...";
    btn.style.opacity = "0.7";

    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;

    // Firebase Magic: Check credentials
    auth.signInWithEmailAndPassword(email, pass)
      .then((userCredential) => {
        // Success! User is logged in.
        btn.textContent = "Access Granted";
        btn.style.background = "#059669"; // Turn green
        
        // Redirect to dashboard after a short delay
        setTimeout(() => {
          window.location.href = 'superadmin_dashboard.html';
        }, 800);
      })
      .catch((error) => {
        // Failed! Show the error
        console.error(error);
        btn.textContent = "Authenticate";
        btn.style.opacity = "1";
        
        // Change the warning box to show the error
        errorMsg.innerHTML = "<strong>ACCESS DENIED.</strong> Invalid credentials provided. Incident logged.";
      });
  });
</script>

</body>
</html>
